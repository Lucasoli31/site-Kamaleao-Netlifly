<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kamaleão Drinkeria - Cardápio Digital</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
    
<style>
        :root {
    --bg-primary: #1a1a1a;
    --bg-secondary: #141414;
    --bg-card: rgba(5, 5, 5, 0.5);
    --bg-card-hover: rgba(5, 5, 5, 0.65);
    --text-primary: #ffffff;
    --text-secondary: #b8b8b8;
    --text-muted: #707070;
    --accent-pink: #ff2d78;
    --accent-cyan: #00e5ff;
    --accent-pink-glow: rgba(255, 45, 120, 0.5);
    --accent-cyan-glow: rgba(0, 229, 255, 0.5);
    --border-subtle: rgba(255, 255, 255, 0.1);
    --border-hover: rgba(255, 255, 255, 0.18);
    --shadow-neon-pink: none;
    --shadow-neon-cyan: none;
    --radius-md: 16px;
    --radius-lg: 24px;
    --font-display: 'Space Grotesk', sans-serif;
    --font-body: 'Inter', sans-serif;
}

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Bebas Neue', sans-serif !important;
            background-color: #000000;
            color: var(--text-primary);
            line-height: 1.5;
            min-height: 100vh;
            overflow-x: hidden;
}

        /* Background */

 .bg-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    pointer-events: none;
    overflow: hidden;
    background-color: #000000;
}

.bg-grid {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: 
        linear-gradient(rgba(255, 45, 120, 0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 45, 120, 0.015) 1px, transparent 1px);
    background-size: 60px 60px;
    opacity: 0.4;
}

.bg-gradient {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: 
        radial-gradient(ellipse at 20% 0%, rgba(255, 45, 120, 0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 100%, rgba(0, 229, 255, 0.06) 0%, transparent 50%);
}

.bg-logo-pattern {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: url('images/logo.png');
    background-repeat: repeat;
    background-position: center;
    background-size: 450px;
    opacity: 0.06;
}

.bg-atmosphere {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
}

.bg-blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.10;
    animation: blobFloat 25s ease-in-out infinite;
}

.bg-blob-1 {
    width: 55vw;
    height: 55vw;
    max-width: 650px;
    max-height: 650px;
    background: linear-gradient(135deg, var(--accent-pink), rgba(255, 45, 120, 0.3));
    top: -20%;
    right: -15%;
}

.bg-blob-2 {
    width: 50vw;
    height: 50vw;
    max-width: 550px;
    max-height: 550px;
    background: linear-gradient(135deg, var(--accent-cyan), rgba(0, 229, 255, 0.3));
    bottom: -15%;
    left: -15%;
    animation-delay: -12s;
}

.bg-blob-3 {
    width: 30vw;
    height: 30vw;
    max-width: 300px;
    max-height: 300px;
    background: linear-gradient(135deg, var(--accent-pink), var(--accent-cyan));
    top: 40%;
    left: 10%;
    opacity: 0.05;
    animation-delay: -6s;
}

@keyframes blobFloat {
    0%, 100% { transform: translate(0, 0) scale(1) rotate(0deg); }
    25% { transform: translate(30px, -20px) scale(1.02) rotate(1deg); }
    50% { transform: translate(-20px, 30px) scale(0.98) rotate(-1deg); }
    75% { transform: translate(15px, 10px) scale(1.01) rotate(0.5deg); }
}

.noise-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    opacity: 0.02;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
}


        .content-wrapper {
            position: relative;
            z-index: 1;
        }

        /* Hero */
        .hero {
            position: relative;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
            padding: 24px;
        }

        .hero-bg {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: url('images/BURNING-MANGOBG.jpg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    z-index: 0;
}

        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, 
                rgba(10, 10, 10, 0.2) 0%,
                rgba(10, 10, 10, 0.4) 40%,
                rgba(10, 10, 10, 0.97) 100%);
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 800px;
        }

        .hero-logo-wrapper {
            margin-bottom: 28px;
            opacity: 0;
            transform: translateY(40px);
            animation: fadeInUp 0.9s ease forwards 0.2s;
        }

        .hero-logo {
            font-family: var(--font-display);
            font-size: clamp(3.5rem, 16vw, 8rem);
            letter-spacing: 0.05em;
            line-height: 0.95;
            font-weight: 700;
        }

        .hero-logo-main {
            display: block;
            color: var(--text-primary);
            text-shadow: 
                0 0 40px var(--accent-pink-glow),
                0 0 80px var(--accent-pink-glow),
                0 0 120px rgba(255, 45, 120, 0.3);
        }

        .hero-logo-accent {
            display: block;
            font-size: 0.3em;
            margin-top: 16px;
            color: var(--accent-cyan);
            text-shadow: 
                0 0 25px var(--accent-cyan-glow),
                0 0 50px var(--accent-cyan-glow);
            letter-spacing: 0.2em;
            font-weight: 500;
        }

        .hero-tagline {
            opacity: 0;
            transform: translateY(25px);
            animation: fadeInUp 0.9s ease forwards 0.5s;
        }

        .hero-tagline-main {
            font-family: var(--font-display);
            font-size: clamp(1.3rem, 6vw, 2.5rem);
            letter-spacing: 0.25em;
            color: var(--accent-pink);
            margin-bottom: 12px;
            text-shadow: 0 0 25px var(--accent-pink-glow);
            font-weight: 600;
        }

        .hero-tagline-sub {
            font-size: clamp(1rem, 3vw, 1.3rem);
            color: var(--text-secondary);
            font-weight: 300;
            letter-spacing: 0.04em;
        }

        .hero-scroll {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            z-index: 2;
            opacity: 0;
            animation: fadeInUp 0.9s ease forwards 1.1s;
            display: flex;
            justify-content: center;
        }

        .hero-scroll-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.85rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            transition: color 0.3s ease;
            font-family: var(--font-body);
            text-align: center;
        }

        .hero-scroll-btn:hover {
            color: var(--accent-cyan);
        }

        .hero-scroll-btn svg {
            width: 26px;
            height: 26px;
            animation: scrollBounce 2s ease-in-out infinite;
        }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes scrollBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(8px); }
        }

        /* Navigation */
        .nav-container {
            position: sticky;
            top: 0;
            z-index: 100;
            background: linear-gradient(180deg, 
                rgba(10, 10, 10, 0.98) 0%,
                rgba(10, 10, 10, 0.95) 50%,
                transparent 100%);
            padding: 14px 0 24px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .nav-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            max-width: 1500px;
            margin: 0 auto;
            padding: 0 16px;
        }

        .nav-arrow {
            flex-shrink: 0;
            width: 44px;
            height: 44px;
            background: var(--bg-card);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--border-subtle);
            border-radius: 50%;
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .nav-arrow:hover:not(:disabled) {
            background: var(--accent-pink);
            border-color: var(--accent-pink);
            transform: scale(1.08);
            box-shadow: var(--shadow-neon-pink);
        }

        .nav-arrow:disabled {
            opacity: 0.2;
            cursor: not-allowed;
        }

        .nav-arrow svg {
            width: 20px;
            height: 20px;
        }

        .nav-scroll {
            flex: 1;
            overflow-x: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        .nav-scroll::-webkit-scrollbar {
            display: none;
        }

        .nav-pills {
            display: flex;
            gap: 10px;
            padding: 4px;
        }

        .nav-pill {
            flex-shrink: 0;
            padding: 12px 22px;
            background: var(--bg-card);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--border-subtle);
            border-radius: 50px;
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
            position: relative;
            overflow: hidden;
            font-family: var(--font-body);
        }

        .nav-pill::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, var(--accent-pink), var(--accent-cyan));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .nav-pill:hover {
            border-color: var(--accent-pink);
            color: var(--text-primary);
        }

        .nav-pill.active {
            background: transparent;
            border-color: transparent;
            color: var(--bg-primary);
            font-weight: 600;
            box-shadow: var(--shadow-neon-pink);
        }

        .nav-pill.active::before {
            opacity: 1;
        }

        .nav-pill span {
            position: relative;
            z-index: 1;
        }

        /* Main Content */
        .main-content {
            width: 100%;
            max-width: 1800px;
            margin: 0 auto;
            padding: 0 30px 70px;
        }

        .menu-section {
            margin-bottom: 40px;
            opacity: 0;
            transform: translateY(35px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        .menu-section.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .section-title {
            font-family: var(--font-display);
            font-size: clamp(1.8rem, 5vw, 2.4rem);
            color: var(--text-primary);
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-subtle);
            position: relative;
            font-weight: 600;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 80px;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-pink), var(--accent-cyan));
            border-radius: 2px;
        }

        /* Cards Grid */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        @media (max-width: 500px) {
            .cards-grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }
            .logo-topo img {
                 max-width: 220px !important;
                opacity: 0.7;
            }
            
        }

        /* Menu Card */
        .menu-card {
    background: rgba(15, 15, 15, 0.45);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: var(--radius-md);
    overflow: hidden;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    min-height: 130px;
    display: flex;
    flex-direction: column;
}

        .menu-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-pink), var(--accent-cyan));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .menu-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: var(--radius-md);
            box-shadow: 
                0 0 40px rgba(255, 45, 120, 0.15),
                0 0 60px rgba(0, 229, 255, 0.1);
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
        }

        .menu-card:hover {
    background: rgba(20, 20, 20, 0.55);
    border-color: rgba(255, 255, 255, 0.12);
    transform: translateY(-4px) scale(1.01);
}

.menu-card:hover::before {
    opacity: 1;
}

.menu-card:hover::after {
    opacity: 1;
}

        .menu-card:active {
            transform: translateY(-2px) scale(1);
        }

        .card-body {
            padding: 24px;
            display: flex;
            flex-direction: column;
            flex: 1;
            justify-content: center;
            position: relative;
            z-index: 1;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin-bottom: 12px;
        }

        .card-name {
            font-family: var(--font-body);    /* Muda de Space Grotesk para Inter */
            font-size: clamp(1.1rem, 3vw, 1.4rem);
            font-weight: 500;
            color: rgba(255, 255, 255, 0.75);    /* Opacidade de 75% */
            flex: 1;
            line-height: 1.2;
        }

        .card-price {
    font-family: var(--font-display);
    font-size: clamp(1.2rem, 4vw, 1.6rem);
    color: #ffffff; 
    white-space: nowrap;
    text-shadow: none; /* 👈 remove o neon */
    font-weight: 600;
    opacity: 0.9;
        }

        .card-description-preview {
    font-size: 0.8rem;
    color: rgba(255, 255, 255, 0.45);
    line-height: 1.5;
    margin-top: 8px;
    margin-bottom: 12px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    text-overflow: ellipsis;
    font-family: var(--font-body);
}


/* setinhia azul nos "ver detalhes" */

        .card-hint {
    font-size: 0.75rem;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: auto;
    padding-top: 10px;
    font-family: var(--font-body);
}

.card-hint svg {
    width: 14px;
    height: 14px;
    color: var(--accent-cyan);
    flex-shrink: 0;
}

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            height: 100dvh;
            background: rgba(5, 5, 5, 0.95);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: linear-gradient(180deg, 
                rgba(18, 18, 18, 0.98) 0%,
                rgba(12, 12, 12, 0.99) 100%);
            border-radius: var(--radius-lg);
            max-width: 480px;
            width: 100%;
            max-height: 92vh;
            max-height: 92dvh;
            overflow-y: auto;
            overflow-x: hidden;
            position: relative;
            transform: scale(0.92) translateY(30px);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid var(--border-subtle);
            box-shadow: none;
        }

        .modal-overlay.active .modal-content {
            transform: scale(1) translateY(0);
        }

        .modal-image-container {
            position: relative;
            width: 100%;
            padding: 24px;
            background: linear-gradient(180deg, 
                rgba(255, 45, 120, 0.05) 0%,
                transparent 100%);
        }

        .modal-image-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
            max-height: 300px;
            border-radius: var(--radius-md);
            overflow: hidden;
            box-shadow: 
                0 0 30px rgba(255, 45, 120, 0.25),
                0 0 60px rgba(0, 229, 255, 0.15),
                inset 0 0 30px rgba(0, 0, 0, 0.3);
        }

        .modal-image-wrapper::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(135deg, 
                var(--accent-pink), 
                var(--accent-cyan),
                var(--accent-pink));
            border-radius: var(--radius-md);
            z-index: -1;
            animation: borderGlow 3s ease-in-out infinite;
        }

        .modal-image-wrapper::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: var(--radius-md);
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.5);
            pointer-events: none;
            z-index: 2;
        }

        @keyframes borderGlow {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; }
        }

        .modal-image {
            width: 100%;
            height: 100%;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            background-color: rgba(15, 15, 15, 0.95);
            border-radius: var(--radius-md);
        }

        .modal-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: linear-gradient(135deg, 
                rgba(255, 45, 120, 0.1) 0%,
                rgba(0, 229, 255, 0.1) 100%);
            border-radius: var(--radius-md);
        }

        .modal-placeholder-text {
            font-family: var(--font-display);
            font-size: clamp(2rem, 6vw, 3rem);
            color: rgba(255, 255, 255, 0.3);
            text-align: center;
            letter-spacing: 0.04em;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
            font-weight: 600;
        }

        .modal-close {
            position: absolute;
            top: 14px;
            right: 14px;
            width: 46px;
            height: 46px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--border-subtle);
            border-radius: 50%;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 10;
        }

        .modal-close:hover {
            background: var(--accent-pink);
            border-color: var(--accent-pink);
            transform: rotate(90deg);
            box-shadow: var(--shadow-neon-pink);
        }

        .modal-close svg {
            width: 22px;
            height: 22px;
        }

        .modal-body {
            padding: 28px;
            background: linear-gradient(180deg, transparent 0%, rgba(0, 0, 0, 0.3) 100%);
        }

        .modal-category {
            display: inline-block;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.18em;
            color: var(--accent-pink);
            background: rgba(255, 45, 120, 0.15);
            padding: 6px 14px;
            border-radius: 25px;
            margin-bottom: 12px;
            border: 1px solid rgba(255, 45, 120, 0.2);
            font-family: var(--font-body);
        }

        .modal-title {
            font-family: var(--font-display);
            font-size: clamp(2rem, 7vw, 2.6rem);
            color: var(--text-primary);
            letter-spacing: 0.02em;
            margin-bottom: 8px;
            line-height: 1.05;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
            font-weight: 700;
        }

        .modal-price {
            font-family: var(--font-display);
            font-size: clamp(1.6rem, 5vw, 2rem);
            color: var(--accent-cyan);
            text-shadow: 0 0 25px var(--accent-cyan-glow);
            margin-bottom: 20px;
            font-weight: 600;
        }

        .modal-description {
            font-size: 1.05rem;
            color: var(--text-secondary);
            line-height: 1.75;
            margin-bottom: 20px;
            font-weight: 300;

            var hue1 = (hash * 37) % 360;
            var hue2 = (hue1 + 60) % 360;
            return 'linear-gradient(135deg, hsl(' + hue1 + ', 65%, 25%), hsl(' + hue2 + ', 65%, 18%))';
        }

        function slugify(text) {
            return text.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
        }
        
        function init() {
            navPillsContainer = document.getElementById('nav-pills');
            navScrollEl = document.getElementById('nav-scroll');
            mainContentEl = document.getElementById('main-content');
            modalEl = document.getElementById('modal');
            modalImageEl = document.getElementById('modal-image');
            modalCategoryEl = document.getElementById('modal-category');
            modalTitleEl = document.getElementById('modal-title');
            modalPriceEl = document.getElementById('modal-price');
            modalDescriptionEl = document.getElementById('modal-description');
            modalTagsEl = document.getElementById('modal-tags');
            navArrowLeftEl = document.querySelector('.nav-arrow-left');
            navArrowRightEl = document.querySelector('.nav-arrow-right');
            heroScrollBtnEl = document.querySelector('.hero-scroll-btn');
            modalCloseEl = document.getElementById('modal-close');
            
            renderNavigation();
            renderSections();
            setupEventListeners();
            updateNavArrows();
        }

        function renderNavigation() {
            for (var i = 0; i < menuData.length; i++) {
                var category = menuData[i];
                var pill = document.createElement('button');
                pill.className = 'nav-pill';
                pill.setAttribute('role', 'tab');
                pill.setAttribute('data-category', category.category);
                pill.setAttribute('data-index', i);
                
                var span = document.createElement('span');
                span.textContent = category.category;
                pill.appendChild(span);
                
                navPillsContainer.appendChild(pill);
            }
        }

        function renderSections() {
            for (var i = 0; i < menuData.length; i++) {
                var category = menuData[i];
                var sectionId = slugify(category.category);
                
                var section = document.createElement('section');
                section.className = 'menu-section';
                section.id = sectionId;
                section.setAttribute('data-category', category.category);
                section.setAttribute('data-index', i);
                
                var title = document.createElement('h2');
                title.className = 'section-title';
                title.textContent = category.category;
                section.appendChild(title);

                var grid = document.createElement('div');
                grid.className = 'cards-grid';

                for (var j = 0; j < category.items.length; j++) {
                    var item = category.items[j];
                    var card = createCard(item, category.category);
                    grid.appendChild(card);
                }

                section.appendChild(grid);
                mainContentEl.appendChild(section);
            }
        }

        function createCard(item, categoryName) {
    var card = document.createElement('article');
    card.className = 'menu-card';
    card.setAttribute('tabindex', '0');
    card.setAttribute('role', 'button');
    card.setAttribute('aria-label', item.name + ' - ' + item.price);
    
    var gradient = generateGradient(item.name);
    
    card.innerHTML = 
        '<div class="card-body">' +
            '<div class="card-header">' +
                '<h3 class="card-name">' + item.name + '</h3>' +
                '<span class="card-price">' + item.price + '</span>' +
            '</div>' +
            '<p class="card-description-preview">' + item.description + '</p>' +
            '<div class="card-hint">' +
                '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>' +
                '<span>Ver detalhes</span>' +
            '</div>' +
        '</div>';

    var itemData = {
        name: item.name,
        price: item.price,
        image: item.image,
        description: item.description,
        tags: item.tags,
        gradient: gradient,
        category: categoryName
    };

    card.addEventListener('click', function() {
        openModal(itemData);
    });
    
    card.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            openModal(itemData);
        }
    });

    return card;
}

        function setupEventListeners() {
            navPillsContainer.addEventListener('click', function(e) {
                var pill = e.target.closest('.nav-pill');
                if (!pill) return;
                
                var category = pill.getAttribute('data-category');
                
                isManualNavigation = true;
                
                setActiveCategory(category, true);
                scrollToCategory(category);
                
                if (manualNavigationTimeout) {
                    clearTimeout(manualNavigationTimeout);
                }
                
                manualNavigationTimeout = setTimeout(function() {
                    isManualNavigation = false;
                }, 800);
            });

            navArrowLeftEl.addEventListener('click', function() {
                navScrollEl.scrollBy({ left: -180, behavior: 'smooth' });
            });
            
            navArrowRightEl.addEventListener('click', function() {
                navScrollEl.scrollBy({ left: 180, behavior: 'smooth' });
            });

            navScrollEl.addEventListener('scroll', updateNavArrows);

            modalCloseEl.addEventListener('click', closeModal);
            modalEl.addEventListener('click', function(e) {
                if (e.target === modalEl) closeModal();
            });
            
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && modalEl.classList.contains('active')) {
                    closeModal();
                }
            });

            heroScrollBtnEl.addEventListener('click', function() {
                var navContainer = document.querySelector('.nav-container');
                var offset = navContainer.offsetTop - 10;
                window.scrollTo({ top: offset, behavior: 'smooth' });
            });

            var observerOptions = {
                root: null,
                rootMargin: '-15% 0px -55% 0px',
                threshold: 0
            };

            var observer = new IntersectionObserver(function(entries) {
                entries.forEach(function(entry) {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                        
                        if (!isManualNavigation) {
                            var category = entry.target.getAttribute('data-category');
                            if (category) {
                                setActiveCategory(category, false);
                            }
                        }
                    }
                });
            }, observerOptions);

            var sections = document.querySelectorAll('.menu-section');
            sections.forEach(function(section) {
                observer.observe(section);
            });
        }

        function setActiveCategory(category, shouldScrollNav) {
            if (activeCategory === category) return;
            
            activeCategory = category;
            
            var pills = document.querySelectorAll('.nav-pill');
            pills.forEach(function(pill) {
                if (pill.getAttribute('data-category') === category) {
                    pill.classList.add('active');
                    if (shouldScrollNav) {
                        pill.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
                    }
                } else {
                    pill.classList.remove('active');
                }
            });
        }

        function scrollToCategory(category) {
            var sectionId = slugify(category);
            var section = document.getElementById(sectionId);
            if (section) {
                var navHeight = document.querySelector('.nav-container').offsetHeight;
                var offset = navHeight + 20;
                var top = section.offsetTop - offset;
                
                window.scrollTo({ top: top, behavior: 'smooth' });
            }
        }

        function updateNavArrows() {
            var scrollLeft = navScrollEl.scrollLeft;
            var maxScroll = navScrollEl.scrollWidth - navScrollEl.clientWidth;
            navArrowLeftEl.disabled = scrollLeft <= 5;
            navArrowRightEl.disabled = scrollLeft >= maxScroll - 5;
        }

        function openModal(itemData) {
            var gradient = itemData.gradient || generateGradient(itemData.name);
            
            if (itemData.image) {
                modalImageEl.style.backgroundImage = "url('" + itemData.image + "')";
                modalImageEl.innerHTML = '<div class="modal-placeholder" style="background: transparent;"></div>';
            } else {
                modalImageEl.style.backgroundImage = '';
                modalImageEl.innerHTML = '<div class="modal-placeholder" style="background: ' + gradient + ';"><span class="modal-placeholder-text">' + itemData.name + '</span></div>';
            }

            modalCategoryEl.textContent = itemData.category;
            modalTitleEl.textContent = itemData.name;
            modalPriceEl.textContent = itemData.price;
            modalDescriptionEl.textContent = itemData.description;
            
            modalTagsEl.innerHTML = '';
            if (itemData.tags && itemData.tags.length > 0) {
                for (var i = 0; i < itemData.tags.length; i++) {
                    var tagEl = document.createElement('span');
                    tagEl.className = 'modal-tag';
                    tagEl.textContent = itemData.tags[i];
                    modalTagsEl.appendChild(tagEl);
                }
            }

            modalEl.classList.add('active');
            modalEl.setAttribute('aria-hidden', 'false');
            document.body.style.overflow = 'hidden';
            
            setTimeout(function() {
                modalCloseEl.focus();
            }, 100);
        }

        function closeModal() {
            modalEl.classList.remove('active');
            modalEl.setAttribute('aria-hidden', 'true');
            document.body.style.overflow = '';
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
